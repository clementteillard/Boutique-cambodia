];

const loadStore = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { products: defaultProducts, cart: [], favorites: [], language: null, splashDone: false };
};
const saveStore = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
};

/* ============ APP CONTEXT ============ */
const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

const AppProvider = ({ children }) => {
  const initial = loadStore();
  const [products, setProducts] = useState(initial.products);
  const [cart, setCart] = useState(initial.cart || []);
  const [favorites, setFavorites] = useState(initial.favorites || []);
  const [language, setLanguage] = useState(initial.language);
  const [splashDone, setSplashDone] = useState(initial.splashDone || false);
  const [isAdmin, setIsAdmin] = useState(false);

  useEffect(() => {
    saveStore({ products, cart, favorites, language, splashDone });
  }, [products, cart, favorites, language, splashDone]);

  const t = (key) => (T[language] || T.fr)[key] || key;

  const addToCart = (product, size) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id && i.size === size);
      if (existing) return prev.map(i => i === existing ? {...i, qty: i.qty + 1} : i);
      return [...prev, { ...product, size, qty: 1 }];
    });
  };
  const updateQty = (id, size, delta) => {
    setCart(prev => prev.map(i => (i.id === id && i.size === size) ? {...i, qty: Math.max(0, i.qty + delta)} : i).filter(i => i.qty > 0));
  };
  const removeFromCart = (id, size) => setCart(prev => prev.filter(i => !(i.id === id && i.size === size)));
  const toggleFav = (id) => setFavorites(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const clearCart = () => setCart([]);

  return (
    <AppContext.Provider value={{
      products, setProducts, cart, addToCart, updateQty, removeFromCart, clearCart,
      favorites, toggleFav, language, setLanguage, splashDone, setSplashDone,
      isAdmin, setIsAdmin, t
    }}>
      {children}
    </AppContext.Provider>
  );
};

/* ============ PRODUCT CARD ============ */
const ProductCard = ({ product, onClick }) => {
  const { favorites, toggleFav, t, language } = useApp();
  const isFav = favorites.includes(product.id);
  const [popping, setPopping] = useState(false);
  const handleFav = (e) => {
    e.stopPropagation();
    toggleFav(product.id);
    setPopping(true);
    setTimeout(() => setPopping(false), 400);
  };
  const displayName = language === 'km' && product.nameKm ? product.nameKm : product.name;
  return (
    <div onClick={onClick} className="cursor-pointer group fade-in">
      <div className="relative aspect-[3/4] bg-sand rounded-xl overflow-hidden mb-3">
        <img src={product.image} alt={displayName} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
        {product.isNew && (
          <div className="absolute top-3 left-3 bg-cream px-2 py-1 text-[10px] uppercase tracking-wider font-medium">{t('new')}</div>
        )}
        <button onClick={handleFav} className={`absolute top-3 right-3 w-9 h-9 bg-cream/90 backdrop-blur rounded-full flex items-center justify-center ${popping ? 'heart-pop' : ''}`}>
          <Icon name="heart" className="w-4 h-4" filled={isFav} />
        </button>
      </div>
      <div className="px-1">
        <div className={`text-sm font-medium leading-tight ${language === 'km' ? 'khmer' : ''}`}>{displayName}</div>
        <div className="text-sm text-ink/60 mt-0.5">${product.price}</div>
      </div>
    </div>
  );
};

      </div>
      <div className="grid grid-cols-2 gap-4 px-5">
        {filtered.map(p => <ProductCard key={p.id} product={p} onClick={() => onSelectProduct(p)} />)}
      </div>
    </div>
  );
};

/* ============ SEARCH VIEW ============ */
const SearchView = ({ onSelectProduct }) => {
  const { products, t } = useApp();
  const [query, setQuery] = useState('');
  const [sort, setSort] = useState('newest');
  const [showFilters, setShowFilters] = useState(false);
  const [maxPrice, setMaxPrice] = useState(200);

  const results = useMemo(() => {
    let r = products.filter(p =>
      p.name.toLowerCase().includes(query.toLowerCase()) && p.price <= maxPrice
    );
    if (sort === 'priceLow') r = [...r].sort((a,b) => a.price - b.price);
    if (sort === 'priceHigh') r = [...r].sort((a,b) => b.price - a.price);
    if (sort === 'newest') r = [...r].sort((a,b) => (b.isNew?1:0) - (a.isNew?1:0));
    return r;
  }, [products, query, sort, maxPrice]);

  return (
    <div className="pb-24">
      <div className="px-5 pt-12 pb-4">
        <div className="font-display text-3xl italic mb-4">{t('search')}</div>
        <div className="flex gap-2">
          <div className="flex-1 relative">
            <Icon name="search" className="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-ink/40" />
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={t('searchPlaceholder')}
              className="w-full bg-white border border-ink/10 rounded-full pl-11 pr-4 py-3 text-sm outline-none focus:border-ink" />
          </div>
          <button onClick={()=>setShowFilters(!showFilters)} className="w-12 h-12 rounded-full bg-white border border-ink/10 flex items-center justify-center">
            <Icon name="sliders" className="w-4 h-4" />
          </button>
        </div>
        {showFilters && (
          <div className="mt-4 bg-white border border-ink/10 rounded-2xl p-4 fade-in">
            <div className="text-xs uppercase tracking-wider text-ink/50 mb-2">{t('priceRange')}: $0 - ${maxPrice}</div>
            <input type="range" min="10" max="200" value={maxPrice} onChange={e=>setMaxPrice(+e.target.value)} className="w-full accent-ink" />
            <div className="text-xs uppercase tracking-wider text-ink/50 mt-4 mb-2">{t('sortBy')}</div>
            <div className="flex gap-2 flex-wrap">
              {['newest','priceLow','priceHigh'].map(s => (
                <button key={s} onClick={()=>setSort(s)} className={`px-3 py-1.5 rounded-full text-xs ${sort===s?'bg-ink text-cream':'bg-sand'}`}>{t(s)}</button>
              ))}
            </div>
          </div>
        )}
      </div>
      <div className="grid grid-cols-2 gap-4 px-5">
        {results.length === 0 ? (
          <div className="col-span-2 text-center py-16 text-ink/40">{t('noResults')}</div>
        ) : results.map(p => <ProductCard key={p.id} product={p} onClick={()=>onSelectProduct(p)} />)}
      </div>
    </div>
  );
};

/* ============ FAVORITES ============ */
const FavView = ({ onSelectProduct }) => {
  const { products, favorites, t } = useApp();
  const favs = products.filter(p => favorites.includes(p.id));
  return (
    <div className="pb-24">
      <div className="px-5 pt-12 pb-6">
        <div className="font-display text-3xl italic">{t('favorites')}</div>
      </div>
      {favs.length === 0 ? (
        <div className="text-center py-20 px-8">
          <Icon name="heart" className="w-12 h-12 mx-auto text-ink/20 mb-4" />
          <div className="text-ink/50">{t('emptyFav')}</div>
        </div>
      ) : (
        <div className="grid grid-cols-2 gap-4 px-5">
          {favs.map(p => <ProductCard key={p.id} product={p} onClick={()=>onSelectProduct(p)} />)}
        </div>
      )}
    </div>
  );
};

/* ============ CART ============ */
const CartView = ({ onCheckout }) => {
  const { cart, updateQty, removeFromCart, t } = useApp();
  const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
  return (
    <div className="pb-24">
      <div className="px-5 pt-12 pb-6">
        <div className="font-display text-3xl italic">{t('cart')}</div>
      </div>
      {cart.length === 0 ? (
        <div className="text-center py-20 px-8">
          <Icon name="bag" className="w-12 h-12 mx-auto text-ink/20 mb-4" />
          <div className="text-ink/50">{t('emptyCart')}</div>
        </div>
      ) : (
        <>
          <div className="px-5 space-y-3">
            {cart.map(item => (
              <div key={`${item.id}-${item.size}`} className="bg-white rounded-2xl p-3 flex gap-3 fade-in">
                <img src={item.image} className="w-20 h-24 object-cover rounded-xl" />
                <div className="flex-1 flex flex-col justify-between">
                  <div>
                    <div className="text-sm font-medium">{item.name}</div>
                    <div className="text-xs text-ink/50 mt-0.5">{t('size')}: {item.size}</div>
                    <div className="text-sm font-medium mt-1">${item.price * item.qty}</div>
                  </div>
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3 bg-sand rounded-full px-1">
                      <button onClick={()=>updateQty(item.id, item.size, -1)} className="w-7 h-7 flex items-center justify-center"><Icon name="minus" className="w-3 h-3"/></button>
                      <span className="text-xs font-medium w-4 text-center">{item.qty}</span>
                      <button onClick={()=>updateQty(item.id, item.size, 1)} className="w-7 h-7 flex items-center justify-center"><Icon name="plus" className="w-3 h-3"/></button>
                    </div>
                    <button onClick={()=>removeFromCart(item.id, item.size)} className="text-ink/40"><Icon name="trash" className="w-4 h-4"/></button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="px-5 mt-6 space-y-2 text-sm">
            <div className="flex justify-between text-ink/60"><span>{t('subtotal')}</span><span>${subtotal}</span></div>
            <div className="flex justify-between text-ink/60"><span>{t('delivery')}</span><span>{t('free')}</span></div>
            <div className="flex justify-between text-lg font-medium pt-2 border-t border-ink/10"><span>{t('total')}</span><span>${subtotal}</span></div>
          </div>
          <div className="px-5 mt-6">
            <button onClick={onCheckout} className="w-full bg-ink text-cream py-4 rounded-full text-sm uppercase tracking-widest font-medium">
              {t('checkout')}
            </button>
          </div>
        </>
      )}
    </div>
  );
};

/* ============ PRODUCT DETAIL ============ */
const ProductDetail = ({ product, onBack }) => {
  const { addToCart, favorites, toggleFav, t, language } = useApp();
  const [size, setSize] = useState(product.sizes[0]);
  const [added, setAdded] = useState(false);
  const isFav = favorites.includes(product.id);
  const displayName = language === 'km' && product.nameKm ? product.nameKm : product.name;

  const handleAdd = () => {
    addToCart(product, size);
    setAdded(true);
    setTimeout(() => setAdded(false), 1500);
  };

  return (
    <div className="min-h-screen bg-cream pb-32 fade-in">
      <div className="relative aspect-[3/4] bg-sand">
        <img src={product.image} className="w-full h-full object-cover" />
        <button onClick={onBack} className="absolute top-12 left-5 w-10 h-10 bg-cream/90 backdrop-blur rounded-full flex items-center justify-center">
          <Icon name="arrow_left" className="w-4 h-4" />
        </button>
        <button onClick={()=>toggleFav(product.id)} className="absolute top-12 right-5 w-10 h-10 bg-cream/90 backdrop-blur rounded-full flex items-center justify-center">
          <Icon name="heart" className="w-4 h-4" filled={isFav}/>
        </button>
      </div>
      <div className="px-6 pt-6">
        {product.isNew && <div className="inline-block text-[10px] uppercase tracking-wider bg-ink text-cream px-2 py-1 mb-3">{t('new')}</div>}
        <div className={`font-display text-3xl italic font-light ${language === 'km' ? 'khmer' : ''}`}>{displayName}</div>
        <div className="text-2xl font-display mt-1">${product.price}</div>
        <div className="w-12 h-px bg-ink/20 my-5"></div>
        <div className="text-sm text-ink/70 leading-relaxed">{product.description}</div>
        <div className="mt-6">
          <div className="text-xs uppercase tracking-widest text-ink/50 mb-3">{t('size')}</div>
          <div className="flex gap-2 flex-wrap">
            {product.sizes.map(s => (
              <button key={s} onClick={()=>setSize(s)}
                className={`min-w-[48px] h-12 px-4 rounded-full text-sm border transition-all ${size===s?'bg-ink text-cream border-ink':'bg-white border-ink/15'}`}>
                {s}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-cream/95 backdrop-blur border-t border-ink/10 p-5">
        <button onClick={handleAdd}
          className={`w-full py-4 rounded-full text-sm uppercase tracking-widest font-medium transition-all ${added ? 'bg-green-700 text-white' : 'bg-ink text-cream'}`}>
          {added ? '✓ ' + t('addCart') : t('addCart')}
        </button>
      </div>
    </div>
  );
};

/* ============ CHECKOUT ============ */
const Checkout = ({ onBack }) => {
  const { cart, clearCart, t } = useApp();
  const [method, setMethod] = useState('whatsapp');
  const [form, setForm] = useState({ name: '', phone: '', address: '', notes: '' });
  const [sent, setSent] = useState(false);
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);

  const handleSend = () => {
    const orderText = `Order from ${form.name}%0A%0A${cart.map(i => `${i.name} (${i.size}) x${i.qty} - $${i.price*i.qty}`).join('%0A')}%0A%0ATotal: $${total}%0APhone: ${form.phone}%0AAddress: ${form.address}%0ANotes: ${form.notes}`;
    if (method === 'whatsapp') {
      window.open(`https://wa.me/855000000000?text=${orderText}`, '_blank');
    } else if (method === 'telegram') {
      window.open(`https://t.me/your_username?text=${orderText}`, '_blank');
    } else if (method === 'local') {
      alert('KHQR / ABA / Wing payment instructions would appear here');
    } else {
      alert('Stripe checkout would open here');
    }
    setSent(true);
    setTimeout(() => { clearCart(); onBack(); }, 2000);
  };

  if (sent) return (
    <div className="min-h-screen bg-cream flex flex-col items-center justify-center fade-in">
      <div className="w-20 h-20 rounded-full bg-ink text-cream flex items-center justify-center text-3xl mb-4">✓</div>
      <div className="font-display text-2xl italic">{t('orderSent')}</div>
    </div>
  );

  const methods = [
    { id: 'whatsapp', label: 'WhatsApp', icon: '💬' },
    { id: 'telegram', label: 'Telegram', icon: '✈️' },
    { id: 'local', label: t('payLocal'), icon: '🏦' },
    { id: 'card', label: t('payCard'), icon: '💳' },
  ];

  return (
    <div className="min-h-screen bg-cream pb-32 fade-in">
      <div className="px-5 pt-12 pb-4 flex items-center gap-3">
        <button onClick={onBack} className="w-10 h-10 rounded-full bg-white border border-ink/10 flex items-center justify-center">
          <Icon name="arrow_left" className="w-4 h-4"/>
        </button>
        <div className="font-display text-2xl italic">{t('checkout')}</div>
      </div>
      <div className="px-5 space-y-4">
        <div className="bg-white rounded-2xl p-4">
          <div className="text-xs uppercase tracking-widest text-ink/50 mb-3">{t('orderSummary')}</div>
          {cart.map(i => (
            <div key={`${i.id}-${i.size}`} className="flex justify-between text-sm py-1">
              <span>{i.name} × {i.qty}</span>
              <span>${i.price * i.qty}</span>
            </div>
          ))}
          <div className="border-t border-ink/10 mt-2 pt-2 flex justify-between font-medium">
            <span>{t('total')}</span><span>${total}</span>
          </div>
        </div>

        <div className="bg-white rounded-2xl p-4 space-y-3">
          <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={t('yourName')} className="w-full bg-sand rounded-xl px-4 py-3 text-sm outline-none"/>
          <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder={t('phone')} className="w-full bg-sand rounded-xl px-4 py-3 text-sm outline-none"/>
          <input value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder={t('address')} className="w-full bg-sand rounded-xl px-4 py-3 text-sm outline-none"/>
          <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder={t('notes')} rows="2" className="w-full bg-sand rounded-xl px-4 py-3 text-sm outline-none resize-none"/>
        </div>

        <div>
          <div className="text-xs uppercase tracking-widest text-ink/50 mb-2 px-2">{t('orderVia')}</div>
          <div className="grid grid-cols-2 gap-2">
            {methods.map(m => (
              <button key={m.id} onClick={()=>setMethod(m.id)}
                className={`p-4 rounded-2xl border text-left transition-all ${method===m.id?'bg-ink text-cream border-ink':'bg-white border-ink/10'}`}>
                <div className="text-2xl mb-1">{m.icon}</div>
                <div className="text-xs font-medium">{m.label}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-cream/95 backdrop-blur border-t border-ink/10 p-5">
        <button onClick={handleSend} disabled={!form.name || !form.phone}
          className="w-full bg-ink text-cream py-4 rounded-full text-sm uppercase tracking-widest font-medium disabled:opacity-30">
          {t('sendOrder')}
        </button>
      </div>
    </div>
  );
};

/* ============ ADMIN ============ */
const AdminView = ({ onBack }) => {
  const { products, setProducts, t, isAdmin, setIsAdmin } = useApp();
  const [pwd, setPwd] = useState('');
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: '', nameKm: '', price: '', category: 'women', image: '', sizes: 'S,M,L', description: '', isNew: false });

  if (!isAdmin) {
    return (
      <div className="min-h-screen bg-cream flex flex-col items-center justify-center px-6 fade-in">
        <button onClick={onBack} className="absolute top-12 left-5 w-10 h-10 rounded-full bg-white border border-ink/10 flex items-center justify-center">
          <Icon name="arrow_left" className="w-4 h-4"/>
        </button>
        <div className="font-display text-3xl italic mb-2">{t('adminAccess')}</div>
        <div className="text-xs text-ink/50 uppercase tracking-wider mb-6">Enter password</div>
        <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder={t('password')}
          className="w-full max-w-xs bg-white border border-ink/10 rounded-full px-5 py-3 text-sm outline-none mb-3"/>
        <button onClick={()=> { if (pwd === 'admin123') setIsAdmin(true); else alert('Wrong password'); }}
          className="w-full max-w-xs bg-ink text-cream py-3 rounded-full text-sm uppercase tracking-widest">
          {t('login')}
        </button>
        <div className="text-[10px] text-ink/40 mt-4">Default: admin123</div>
      </div>
    );
  }

  const startEdit = (p) => {
    setEditing(p.id);
    setForm({ ...p, sizes: p.sizes.join(',') });
  };
  const startNew = () => {
    setEditing('new');
    setForm({ name: '', nameKm: '', price: '', category: 'women', image: '', sizes: 'S,M,L', description: '', isNew: true });
  };
  const save = () => {
    const data = { ...form, price: +form.price, sizes: form.sizes.split(',').map(s=>s.trim()) };
    if (editing === 'new') {
      setProducts([...products, { ...data, id: Date.now() }]);
    } else {
      setProducts(products.map(p => p.id === editing ? { ...data, id: editing } : p));
    }
    setEditing(null);
  };
  const remove = (id) => {
    if (confirm('Delete?')) setProducts(products.filter(p => p.id !== id));
  };

  return (
    <div className="min-h-screen bg-cream pb-24 fade-in">
      <div className="px-5 pt-12 pb-4 flex items-center justify-between">
        <button onClick={onBack} className="w-10 h-10 rounded-full bg-white border border-ink/10 flex items-center justify-center">
          <Icon name="arrow_left" className="w-4 h-4"/>
        </button>
        <div className="font-display text-2xl italic">{t('admin')}</div>
        <button onClick={startNew} className="w-10 h-10 rounded-full bg-ink text-cream flex items-center justify-center">
          <Icon name="plus" className="w-4 h-4"/>
        </button>
      </div>

      {editing && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-end" onClick={()=>setEditing(null)}>
          <div className="bg-cream w-full rounded-t-3xl p-6 slide-up max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
            <div className="font-display text-xl italic mb-4">{editing==='new'?t('addProduct'):t('editProduct')}</div>
            <div className="space-y-3">
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={t('name')+' (EN/FR)'} className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none"/>
              <input value={form.nameKm} onChange={e=>setForm({...form,nameKm:e.target.value})} placeholder={t('name')+' (ខ្មែរ)'} className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none khmer"/>
              <input type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} placeholder={t('price')} className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none"/>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none">
                <option value="women">{t('women')}</option>
                <option value="men">{t('men')}</option>
                <option value="accessories">{t('accessories')}</option>
              </select>
              <input value={form.image} onChange={e=>setForm({...form,image:e.target.value})} placeholder={t('image')} className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none"/>
              <input value={form.sizes} onChange={e=>setForm({...form,sizes:e.target.value})} placeholder="S,M,L,XL" className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none"/>
              <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder={t('description')} rows="3" className="w-full bg-white rounded-xl px-4 py-3 text-sm border border-ink/10 outline-none resize-none"/>
              <label className="flex items-center gap-2 text-sm">
                <input type="checkbox" checked={form.isNew} onChange={e=>setForm({...form,isNew:e.target.checked})}/>
                {t('new')}
              </label>
            </div>
            <div className="flex gap-2 mt-4">
              <button onClick={()=>setEditing(null)} className="flex-1 py-3 rounded-full border border-ink/15 text-sm uppercase tracking-wider">{t('cancel')}</button>
              <button onClick={save} className="flex-1 py-3 rounded-full bg-ink text-cream text-sm uppercase tracking-wider">{t('save')}</button>
            </div>
          </div>
        </div>
      )}

      <div className="px-5 space-y-3">
        {products.map(p => (
          <div key={p.id} className="bg-white rounded-2xl p-3 flex gap-3 items-center">
            <img src={p.image} className="w-16 h-20 object-cover rounded-xl"/>
            <div className="flex-1">
              <div className="text-sm font-medium">{p.name}</div>
              <div className="text-xs text-ink/50">${p.price} · {t(p.category)}</div>
            </div>
            <button onClick={()=>startEdit(p)} className="w-9 h-9 rounded-full bg-sand flex items-center justify-center"><Icon name="edit" className="w-4 h-4"/></button>
            <button onClick={()=>remove(p.id)} className="w-9 h-9 rounded-full bg-sand flex items-center justify-center text-clay"><Icon name="trash" className="w-4 h-4"/></button>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ============ BOTTOM NAV ============ */
const BottomNav = ({ active, onChange }) => {
  const { cart, t } = useApp();
  const cartCount = cart.reduce((s,i) => s + i.qty, 0);
  const tabs = [
    { id: 'shop', icon: 'home', label: t('shop') },
    { id: 'search', icon: 'search', label: t('search') },
    { id: 'favorites', icon: 'heart', label: t('favorites') },
    { id: 'cart', icon: 'bag', label: t('cart'), badge: cartCount },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-cream/95 backdrop-blur border-t border-ink/10 z-40">
      <div className="flex justify-around items-center h-16 max-w-md mx-auto px-2">
        {tabs.map(t => (
          <button key={t.id} onClick={()=>onChange(t.id)} className="flex flex-col items-center justify-center gap-0.5 flex-1 relative">
            <div className="relative">
              <Icon name={t.icon} className={`w-5 h-5 ${active===t.id?'text-ink':'text-ink/40'}`} filled={active===t.id && t.icon==='heart'}/>
              {t.badge > 0 && (
                <div className="absolute -top-1 -right-2 bg-clay text-cream text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-medium">{t.badge}</div>
              )}
            </div>
            <div className={`text-[9px] uppercase tracking-wider ${active===t.id?'text-ink font-medium':'text-ink/40'}`}>{t.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
};

/* ============ MAIN ============ */
const App = () => {
  const { splashDone, language } = useApp();
  const [tab, setTab] = useState('shop');
  const [selected, setSelected] = useState(null);
  const [checkout, setCheckout] = useState(false);
  const [admin, setAdmin] = useState(false);

  if (!splashDone) return <Splash />;
  if (!language) return <LangSelect />;
  if (admin) return <AdminView onBack={()=>setAdmin(false)} />;
  if (checkout) return <Checkout onBack={()=>setCheckout(false)} />;
  if (selected) return <ProductDetail product={selected} onBack={()=>setSelected(null)} />;

  return (
    <div className="max-w-md mx-auto min-h-screen relative">
      {tab === 'shop' && <ShopView onSelectProduct={setSelected} onAdminClick={()=>setAdmin(true)} />}
      {tab === 'search' && <SearchView onSelectProduct={setSelected} />}
      {tab === 'favorites' && <FavView onSelectProduct={setSelected} />}
      {tab === 'cart' && <CartView onCheckout={()=>setCheckout(true)} />}
      <BottomNav active={tab} onChange={setTab} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App /></AppProvider>
);
</script>
</body>
</html>
